<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  @keyframes floatA{ 0%,100%{ transform:translateY(0) rotate(-4deg);} 50%{ transform:translateY(-26px) rotate(-1deg);} }
  @keyframes floatB{ 0%,100%{ transform:translateY(0) rotate(6deg);} 50%{ transform:translateY(-32px) rotate(2deg);} }
  @keyframes floatC{ 0%,100%{ transform:translateY(0) rotate(-2deg);} 50%{ transform:translateY(-22px) rotate(2deg);} }
  @keyframes orbDrift{ 0%,100%{ transform:translate(0,0) scale(1);} 33%{ transform:translate(60px,-40px) scale(1.15);} 66%{ transform:translate(-40px,30px) scale(.92);} }
  @keyframes pDrift{ 0%{ transform:translate(0,0) rotate(0); opacity:0;} 8%{ opacity:1;} 92%{ opacity:1;} 100%{ transform:translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity:0;} }
  @keyframes leafDrift{ 0%{ transform:translate(0,0) rotate(0deg);} 50%{ transform:translate(var(--lx), var(--ly)) rotate(var(--lr));} 100%{ transform:translate(0,0) rotate(0deg);} }
  @keyframes bgPan{ 0%{ background-position:0 0;} 100%{ background-position:520px 320px;} }
  @keyframes haze{ 0%,100%{ opacity:.55;} 50%{ opacity:.9;} }
  @keyframes rise{ 0%{ opacity:0; transform:translateY(26px);} 100%{ opacity:1; transform:translateY(0);} }
  @keyframes ring{ 0%{ transform:scale(.6); opacity:.7;} 100%{ transform:scale(1.9); opacity:0;} }
  /* ===== RESPONSIVE ===== */
  @media (max-width:1100px){
    [data-hero]{ grid-template-columns:1.1fr 1fr !important; padding:8px 34px 40px !important; gap:10px; }
    [data-left]{ max-width:520px !important; }
    [data-visual]{ height:540px !important; }
    [data-nav]{ gap:26px !important; font-size:15px !important; }
    [data-feat]{ grid-template-columns:repeat(2,auto) !important; }
  }
  @media (max-width:760px){
    [data-header]{ padding:18px 20px !important; }
    [data-nav]{ display:none !important; }
    [data-hero]{ grid-template-columns:1fr !important; text-align:center !important; padding:6px 22px 80px !important; min-height:auto !important; row-gap:6px; }
    [data-left]{ max-width:560px !important; margin:0 auto !important; }
    [data-sub]{ margin-left:auto !important; margin-right:auto !important; }
    [data-feat]{ justify-content:center !important; }
    [data-cta]{ justify-content:center !important; flex-wrap:wrap !important; }
    [data-social]{ justify-content:center !important; }
    [data-visual]{ height:380px !important; max-width:480px; margin:8px auto 0 !important; }
    [data-videobtn]{ display:none !important; }
    [data-carousel]{ bottom:20px !important; }
    [data-h1] span{ white-space:normal !important; }
  }
</style>
</helmet>

<div style="position:relative; width:100%; min-height:100vh; overflow:hidden; font-family:'Be Vietnam Pro',sans-serif; background:radial-gradient(120% 90% at 78% 28%, #f7eede 0%, #f1e3cf 42%, #ead8bf 100%);">

  <!-- ===== ANIMATED BACKGROUND ===== -->
  <div style="position:absolute; inset:0; z-index:0; overflow:hidden;">
    <!-- drifting spice texture -->
    <div style="position:absolute; inset:-10%; opacity:.45; background-image:radial-gradient(circle, rgba(74,48,24,.55) 1.1px, transparent 1.4px), radial-gradient(circle, rgba(176,58,34,.5) 1px, transparent 1.4px), radial-gradient(circle, rgba(94,140,52,.4) 1.1px, transparent 1.5px); background-size:46px 46px, 78px 78px, 120px 120px; background-position:0 0, 22px 30px, 60px 14px; animation:bgPan 34s linear infinite;"></div>
    <!-- soft drifting light orbs -->
    <div style="position:absolute; top:-12%; right:8%; width:560px; height:560px; border-radius:50%; background:radial-gradient(circle, rgba(247,150,40,.30), rgba(247,150,40,0) 68%); filter:blur(8px); animation:orbDrift 18s ease-in-out infinite;"></div>
    <div style="position:absolute; bottom:-18%; right:30%; width:620px; height:620px; border-radius:50%; background:radial-gradient(circle, rgba(110,170,60,.26), rgba(110,170,60,0) 68%); filter:blur(10px); animation:orbDrift 24s ease-in-out infinite reverse;"></div>
    <div style="position:absolute; top:18%; left:36%; width:480px; height:480px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.5), rgba(255,255,255,0) 70%); filter:blur(6px); animation:haze 12s ease-in-out infinite;"></div>
    <div style="position:absolute; top:30%; right:16%; width:360px; height:360px; border-radius:50%; background:radial-gradient(circle, rgba(214,140,80,.22), transparent 70%); filter:blur(16px);"></div>
    <div style="position:absolute; bottom:6%; left:6%; width:320px; height:320px; border-radius:50%; background:radial-gradient(circle, rgba(255,242,214,.55), transparent 72%); filter:blur(14px);"></div>
    <!-- floating spice particles -->
    <sc-for list="{{ particles }}" as="p" hint-placeholder-count="0">
      <div style="{{ p.style }}"></div>
    </sc-for>
    <!-- floating herb leaves -->
    <sc-for list="{{ herbs }}" as="h" hint-placeholder-count="0">
      <svg viewBox="0 0 40 16" style="{{ h.style }}"><path d="M2 8 C 12 -2, 28 -2, 38 8 C 28 18, 12 18, 2 8 Z" fill="{{ h.fill }}"></path><path d="M4 8 L 36 8" stroke="rgba(40,70,25,.45)" stroke-width="1"></path></svg>
    </sc-for>
  </div>

  <!-- ===== NAV ===== -->
  <header data-header style="position:relative; z-index:30; display:flex; align-items:center; justify-content:space-between; padding:26px 56px; max-width:1500px; margin:0 auto;">
    <div style="display:flex; align-items:center; gap:9px;">
      <svg width="34" height="34" viewBox="0 0 48 48" style="flex:none;"><path d="M14 8v12M11 8v6a3 3 0 0 0 6 0V8" stroke="#5b6470" stroke-width="3" stroke-linecap="round" fill="none"></path><path d="M6 30 q12 -10 24 -10" stroke="#6eb33b" stroke-width="3" fill="none" stroke-linecap="round"></path><ellipse cx="36" cy="13" rx="6" ry="4" transform="rotate(-30 36 13)" fill="#6eb33b"></ellipse><rect x="22" y="18" width="16" height="6" rx="3" fill="#f0742a"></rect></svg>
      <div style="font-weight:900; font-size:25px; letter-spacing:-.5px; line-height:1;"><span style="color:#4ea023;">Meal</span><span style="color:#f0742a; font-style:italic;">Fit</span><span style="color:#7b8794; font-size:13px; font-weight:800; vertical-align:top; margin-left:2px;">VN</span></div>
    </div>
    <nav data-nav style="display:flex; align-items:center; gap:46px; font-weight:600; font-size:16.5px;">
      <a href="#" style="color:#e8721f; text-decoration:none; position:relative; padding-bottom:6px;">Trang chủ<span style="position:absolute; left:0; bottom:0; width:100%; height:3px; border-radius:3px; background:#f0742a;"></span></a>
      <a href="#" style="color:#4a4640; text-decoration:none;">Thực đơn</a>
      <a href="#" style="color:#4a4640; text-decoration:none;">Về chúng tôi</a>
    </nav>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="display:flex; align-items:center; gap:8px; background:#fff; border:1px solid rgba(0,0,0,.06); border-radius:30px; padding:9px 14px; box-shadow:0 6px 18px -10px rgba(80,60,30,.4);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a857c" stroke-width="2"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"></path></svg>
        <span style="font-size:15px;">🇻🇳</span><span style="font-weight:700; font-size:14px; color:#4a4640;">VI</span>
      </div>
      <div style="width:42px; height:42px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px -10px rgba(80,60,30,.4); border:1px solid rgba(0,0,0,.05);">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#8a857c" stroke-width="2"><circle cx="12" cy="8" r="4"></circle><path d="M5 21c0-4 3.5-6 7-6s7 2 7 6"></path></svg>
      </div>
      <div style="position:relative; width:42px; height:42px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px -10px rgba(80,60,30,.4); border:1px solid rgba(0,0,0,.05);">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#8a857c" stroke-width="2"><path d="M6 8h12l-1 11H7L6 8z"></path><path d="M9 8a3 3 0 0 1 6 0"></path></svg>
        <span style="position:absolute; top:-4px; right:-4px; min-width:19px; height:19px; padding:0 4px; border-radius:10px; background:#f0742a; color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center;">2</span>
      </div>
    </div>
  </header>

  <!-- ===== HERO BODY ===== -->
  <main data-hero style="position:relative; z-index:20; max-width:1500px; margin:0 auto; padding:8px 56px 40px; display:grid; grid-template-columns:1.12fr 1fr; align-items:center; min-height:calc(100vh - 110px);">

    <!-- LEFT -->
    <div data-left style="max-width:640px;">
      <div style="display:inline-flex; align-items:center; gap:8px; background:rgba(110,179,59,.14); color:#4a8a22; font-weight:700; font-size:13.5px; letter-spacing:.06em; padding:8px 16px; border-radius:30px; margin-bottom:26px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="#5fa12c"><path d="M12 2C7 7 5 11 5 15a7 7 0 0 0 14 0c0-4-2-8-7-13z"></path></svg>EAT CLEAN – LIVE FIT
      </div>
      <h1 data-h1 style="margin:0 0 22px; font-weight:800; font-size:clamp(30px,4vw,56px); line-height:1.1; letter-spacing:-1.2px; color:#2c2924;"><span style="display:block; white-space:nowrap;">Ăn chuẩn – Tập chất</span><span style="display:block; white-space:nowrap;">Cùng <span style="color:#4ea023;">Meal</span><span style="color:#f0742a;">Fit</span></span></h1>
      <p data-sub style="margin:0 0 34px; font-size:18.5px; line-height:1.6; color:#6c6457; max-width:430px;">Thực đơn healthy mỗi ngày, được thiết kế riêng cho mục tiêu của bạn. Tươi ngon – Tiện lợi – Đủ chất.</p>

      <div data-feat style="display:grid; grid-template-columns:repeat(3,auto); gap:22px 30px; margin-bottom:38px; justify-content:start;">
        <sc-for list="{{ features }}" as="f" hint-placeholder-count="4">
          <div style="display:flex; align-items:center; gap:11px;">
            <div style="width:42px; height:42px; border-radius:13px; flex:none; display:flex; align-items:center; justify-content:center; border:1.6px solid {{ f.ring }};">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ f.ring }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="{{ f.icon }}"></path></svg>
            </div>
            <div style="line-height:1.25;"><div style="font-weight:700; font-size:15px; color:#37332d;">{{ f.t1 }}</div><div style="font-size:14px; color:#8a8276;">{{ f.t2 }}</div></div>
          </div>
        </sc-for>
      </div>

      <div data-cta style="display:flex; align-items:center; gap:16px; margin-bottom:42px;">
        <button style="display:inline-flex; align-items:center; gap:12px; border:none; cursor:pointer; background:linear-gradient(100deg,#f7941d,#ef6a1e); color:#fff; font-family:inherit; font-weight:700; font-size:17px; padding:17px 30px; border-radius:40px; box-shadow:0 18px 34px -14px rgba(239,106,30,.7);">Đặt Hàng Ngay<span style="width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg></span></button>
        <button style="display:inline-flex; align-items:center; gap:12px; cursor:pointer; background:#fff; color:#e8721f; font-family:inherit; font-weight:700; font-size:17px; padding:15px 26px; border-radius:40px; border:2px solid #f0742a; box-shadow:0 14px 30px -16px rgba(239,106,30,.5);">Xem thực đơn<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef6a1e" stroke-width="2.2" stroke-linecap="round"><path d="M8 6h12M8 12h12M8 18h12M3.5 6h.01M3.5 12h.01M3.5 18h.01"></path></svg></button>
      </div>

      <div data-social style="display:flex; align-items:center; gap:14px;">
        <div style="display:flex;">
          <sc-for list="{{ avatars }}" as="a" hint-placeholder-count="4">
            <div style="width:42px; height:42px; border-radius:50%; margin-left:-12px; border:3px solid #f4e8d6; background:{{ a.bg }};"></div>
          </sc-for>
        </div>
        <div style="line-height:1.3;"><div style="font-weight:800; font-size:16px; color:#37332d;">10.000+ khách hàng</div><div style="font-size:14px; color:#8a8276;">đã tin tưởng MealFit</div></div>
      </div>
    </div>

    <!-- RIGHT VISUAL -->
    <div data-visual style="position:relative; height:740px;">
      <!-- warm glow pools behind the cluster so cutout rims blend -->
      <div style="position:absolute; inset:-8% -6% -4% -8%; z-index:0; background:radial-gradient(58% 52% at 52% 44%, rgba(255,247,232,.95), rgba(255,244,224,.55) 46%, rgba(255,240,214,0) 72%);"></div>
      <div style="position:absolute; top:34%; left:24%; width:60%; height:48%; z-index:0; background:radial-gradient(closest-side, rgba(255,235,205,.7), rgba(255,235,205,0) 75%); filter:blur(6px);"></div>
      <!-- chicken (upper-left) -->
      <div style="position:absolute; top:-1%; left:-2%; width:50%; z-index:3;">
        <div style="transform:{{ pChicken }}; transition:transform .5s cubic-bezier(.2,.8,.2,1);">
          <div style="animation:floatA 6.5s ease-in-out infinite;">
            <img src="assets/chicken.png" alt="Ức gà nướng" style="width:100%; display:block; transform:rotate(-10deg); filter:drop-shadow(0 16px 12px rgba(80,50,20,.22)) drop-shadow(0 48px 42px rgba(90,60,25,.42));">
          </div>
        </div>
      </div>
      <!-- beef (upper-right) -->
      <div style="position:absolute; top:18%; right:-5%; width:46%; z-index:2;">
        <div style="transform:{{ pBeef }}; transition:transform .5s cubic-bezier(.2,.8,.2,1);">
          <div style="animation:floatB 7.6s ease-in-out infinite;">
            <img src="assets/beef.png" alt="Thăn bò" style="width:100%; display:block; transform:rotate(6deg); filter:drop-shadow(0 16px 12px rgba(80,40,30,.24)) drop-shadow(0 48px 42px rgba(90,40,30,.42));">
          </div>
        </div>
      </div>
      <!-- salmon (lower-center) -->
      <div style="position:absolute; top:48%; left:8%; width:74%; z-index:4;">
        <div style="transform:{{ pSalmon }}; transition:transform .5s cubic-bezier(.2,.8,.2,1);">
          <div style="animation:floatC 5.8s ease-in-out infinite;">
            <img src="assets/salmon.png" alt="Cá hồi" style="width:100%; display:block; transform:rotate(-4deg); filter:drop-shadow(0 18px 14px rgba(110,60,20,.24)) drop-shadow(0 52px 46px rgba(120,60,20,.42));">
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== CAROUSEL DOTS ===== -->
  <div data-carousel style="position:absolute; left:50%; bottom:34px; transform:translateX(-50%); z-index:25; display:flex; align-items:center; gap:18px; background:#fff; padding:11px 16px; border-radius:40px; box-shadow:0 16px 34px -18px rgba(80,60,30,.5);">
    <button onClick="{{ prev }}" style="width:38px; height:38px; border-radius:50%; border:none; cursor:pointer; background:#f4ede1; display:flex; align-items:center; justify-content:center;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8a857c" stroke-width="2.4" stroke-linecap="round"><path d="M15 6l-6 6 6 6"></path></svg></button>
    <div style="display:flex; align-items:center; gap:9px;">
      <sc-for list="{{ dots }}" as="d" hint-placeholder-count="5">
        <div onClick="{{ d.go }}" style="{{ d.style }}"></div>
      </sc-for>
    </div>
    <button onClick="{{ next }}" style="width:38px; height:38px; border-radius:50%; border:none; cursor:pointer; background:#f4ede1; display:flex; align-items:center; justify-content:center;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8a857c" stroke-width="2.4" stroke-linecap="round"><path d="M9 6l6 6-6 6"></path></svg></button>
  </div>

  <!-- ===== VIDEO BTN ===== -->
  <div data-videobtn style="position:absolute; right:56px; bottom:40px; z-index:25; display:flex; align-items:center; gap:13px; cursor:pointer;">
    <div style="position:relative; width:56px; height:56px;">
      <div style="position:absolute; inset:0; border-radius:50%; border:2px solid rgba(239,106,30,.4); animation:ring 2.2s ease-out infinite;"></div>
      <div style="position:absolute; inset:0; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 26px -12px rgba(80,60,30,.6);"><svg width="18" height="18" viewBox="0 0 24 24" fill="#ef6a1e"><path d="M8 5v14l11-7z"></path></svg></div>
    </div>
    <div style="line-height:1.25;"><div style="font-weight:700; font-size:15px; color:#37332d;">Xem video</div><div style="font-size:13.5px; color:#8a8276;">về MealFit</div></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = { px:0, py:0, active:0 };
  }
  componentDidMount(){
    this._mm = (e)=>{
      const w = window.innerWidth, h = window.innerHeight;
      this.setState({ px:(e.clientX/w - 0.5), py:(e.clientY/h - 0.5) });
    };
    window.addEventListener('mousemove', this._mm);
  }
  componentWillUnmount(){ window.removeEventListener('mousemove', this._mm); }

  buildParticles(){
    // peppercorns (black/red/green/white) + salt flecks + paprika dust
    const kinds = [
      { c:'radial-gradient(circle at 35% 30%, #6b5640, #241810)', min:5, max:9 },   // black peppercorn
      { c:'radial-gradient(circle at 35% 30%, #e26a4a, #9c2a18)', min:4, max:8 },   // red/pink pepper
      { c:'radial-gradient(circle at 35% 30%, #9cc25a, #4e7a26)', min:4, max:8 },   // green pepper
      { c:'radial-gradient(circle at 40% 35%, #fffaf0, #e6dcc8)', min:2, max:4 },   // salt fleck
      { c:'radial-gradient(circle at 40% 35%, #fff, #f2ece0)', min:2, max:3.5 },    // salt fleck
      { c:'radial-gradient(circle at 35% 30%, #d98a3a, #a85618)', min:3, max:6 },   // paprika
    ];
    const arr = [];
    let seed = 7;
    const rnd = ()=>{ seed = (seed*9301+49297)%233280; return seed/233280; };
    for(let i=0;i<62;i++){
      const k = kinds[Math.floor(rnd()*kinds.length)];
      const size = k.min + rnd()*(k.max-k.min);
      const left = rnd()*100;
      const top = rnd()*100;
      const dx = (rnd()*2-1)*90;
      const dy = -(40+rnd()*160);
      const dr = (rnd()*2-1)*360;
      const dur = 9 + rnd()*12;
      const delay = -rnd()*16;
      const blur = rnd()>0.78 ? 'filter:blur(.7px);' : '';
      const sh = size>5 ? 'box-shadow:0 1px 2px rgba(60,40,20,.35);' : '';
      arr.push({ style:`position:absolute; left:${left}%; top:${top}%; width:${size}px; height:${size}px; border-radius:50%; background:${k.c}; ${sh} --dx:${dx}px; --dy:${dy}px; --dr:${dr}deg; animation:pDrift ${dur}s linear ${delay}s infinite; ${blur}` });
    }
    return arr;
  }
  buildHerbs(){
    const arr = [];
    let seed = 21;
    const rnd = ()=>{ seed = (seed*9301+49297)%233280; return seed/233280; };
    const greens = ['#6eb33b','#5a9c2a','#7cc24a','#4e8a23','#3f7a1e'];
    for(let i=0;i<13;i++){
      const w = 18 + rnd()*30;
      const left = rnd()*100;
      const top = rnd()*100;
      const rot = rnd()*360;
      const lx = (rnd()*2-1)*40;
      const ly = (rnd()*2-1)*40;
      const lr = (rnd()*2-1)*50;
      const dur = 12 + rnd()*10;
      const delay = -rnd()*10;
      arr.push({ fill:greens[Math.floor(rnd()*greens.length)], style:`position:absolute; left:${left}%; top:${top}%; width:${w}px; height:auto; opacity:${(0.4+rnd()*0.35).toFixed(2)}; filter:drop-shadow(0 2px 3px rgba(40,70,25,.25)); transform:rotate(${rot}deg); --lx:${lx}px; --ly:${ly}px; --lr:${lr}deg; animation:leafDrift ${dur}s ease-in-out ${delay}s infinite;` });
    }
    return arr;
  }

  renderVals(){
    const { px, py, active } = this.state;
    const tf = (depth)=>`translate3d(${(px*depth).toFixed(1)}px, ${(py*depth).toFixed(1)}px, 0)`;
    const features = [
      { ring:'#6eb33b', t1:'Nguyên liệu', t2:'tươi sạch', icon:'M12 2v20M2 12h20M5 5l14 14M19 5L5 19' },
      { ring:'#ef8a2e', t1:'Cân đối', t2:'dinh dưỡng', icon:'M3 18l5-8 4 5 3-6 5 9' },
      { ring:'#6eb33b', t1:'Giao hàng', t2:'nhanh chóng', icon:'M3 13h11V6H3zM14 9h4l3 4v4h-7zM7 19a2 2 0 1 0 0-.01M18 19a2 2 0 1 0 0-.01' },
      { ring:'#e0573a', t1:'Đa dạng', t2:'thực đơn', icon:'M4 7h16M4 12h16M4 17h10' },
    ];
    const avatars = [
      { bg:'linear-gradient(135deg,#f0b27a,#d98a55)' },
      { bg:'linear-gradient(135deg,#a8c98a,#7aa657)' },
      { bg:'linear-gradient(135deg,#e8a07a,#cf6f4a)' },
      { bg:'linear-gradient(135deg,#c9b08a,#9c8157)' },
    ];
    const dots = [0,1,2,3,4].map(i=>({
      go: ()=>this.setState({active:i}),
      style: i===active
        ? 'width:26px; height:9px; border-radius:6px; background:#ef6a1e; cursor:pointer; transition:all .3s;'
        : 'width:9px; height:9px; border-radius:50%; background:#e2d6c4; cursor:pointer; transition:all .3s;'
    }));
    return {
      particles: this._particles || (this._particles = this.buildParticles()),
      herbs: this._herbs || (this._herbs = this.buildHerbs()),
      pChicken: tf(22), pBeef: tf(30), pSalmon: tf(42),
      features, avatars, dots,
      prev: ()=>this.setState({active:(active+4)%5}),
      next: ()=>this.setState({active:(active+1)%5}),
    };
  }
}
</script>
</body>
